        margin: auto;

        align-items: center;
        justify-content: center;

        width: 100%;

        flex: 1;
        aspect-ratio: 1 / 1;

        border-radius: 12px;

        object-fit: cover;
        transition: transform 0.4s ease;
    }

    .insta-overlay {
        position: flex;
        top: 0;
        left: 0;

        height: 180px;
        margin: auto;

        box-sizing: border-box;

        transition: opacity 0.3s ease;
        text-align: justify;
        font-size: clamp(18px, 1.5vw, 30px);
        line-height: 1.4;
        text-decoration: none;
        border-radius: 12px;
        mask-image: linear-gradient(to bottom, black 40px, transparent 150px);
        overflow: hidden;
        /* リンクの下線を消す */
    }



    .insta-item video {
        width: 100%;
        height: auto;
        flex: 1;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        border-radius: 12px;

    /*学年トクラス選択メニュー*/
    .menu {

        box-sizing: border-box;

        position: relative;
        display: flex;
        justify-content: left;
        border-radius: 8px;
        height: 45px;
        width: 100%;
        border: 2px solid #000000;
    }

    .link {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 60px;
        height: 100%;
        border-radius: 6px;
        position: relative;
        z-index: 1;
        overflow: hidden;
        transform-origin: center left;
        transition: width 0.4s ease-in;
        text-decoration: none;
        color: inherit;

        &:before {
            position: absolute;
            z-index: -1;
            content: "";
            display: block;
            border-radius: 6px;
            width: 100%;
            height: 100%;
            top: 0;
            transform: translateX(100%);
            transition: transform 0.2s ease-in;
            transform-origin: center center;
            background-color: #000000;
            color: black;
        }

        &:hover,
        &:focus,
        &:link.is-active {
            outline: 0;
            width: 130px;
            height: 100%;

            &:before,
            .link-title {
                transform: translateX(0);


                opacity: 1;
                color: #ffffff;
            }

            .link-icon {
                color: #ffffff;
                transition: color 0.2s ease-in;
                transform: translateX(0);


            }
        }


    }

    .link-icon {

        display: block;
        flex-shrink: 0;
        left: 1.5vw;
        position: absolute;

        font-size: 20px;
        align-items: center;
    }

    .link-title {
        transform: translateX(100%);
        transition: transform 0.2s ease-in;
        transform-origin: center right;
        display: block;
        text-align: center;
        margin-left: 2.5vw;
        margin-bottom: 1px;
        font-size: 16px;
        width: 100%;
        align-items: center;

    }


    .inputRadio label {
        font-size: 24px;

        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 10px;
    }

    /*フォームのテキストボックス*/
    .inputGroup {
        position: relative;
        width: 100%;
        margin: auto;

    }

    .inputGroup input {
        width: 100%;
        height: 45px;
        padding: 10px;
        box-sizing: border-box;
        outline: none;

        font-size: 20px;

        text-transform: uppercase;
        transition: 0.5s;

        background: #000;
        letter-spacing: 0.2em;
        color: #fff;
        border: 2px;
    }

    .inputGroup input:valid,
    .inputGroup input:focus {
        border: 2px solid #000;
        border-radius: 8px;
    }


    #form_OK_button {
        display: flex;
        flex-direction: row;
        gap: 25px;

    }

    .enter {

    }

    }

    }

    }


    /*フォームのtoggle*/
    .inputToggle {

        display: flex;
        flex-wrap: wrap;
        border-radius: 0.5rem;

        border: #000 2px solid;

        box-shadow: 0 0 0px 1px rgba(0, 0, 0, 0.06);

    .inputToggle .Toggle {

    .inputToggle input {

        background: transparent;
        border: 2px solid #000;
        transition: 0.1s;

    #form-message textarea:focus~span,
    #form-message textarea:not(:placeholder-shown)~span {

        background: #000;
        letter-spacing: 0.2em;
        color: #fff;
        border: 2px;
    }

    #form-message input:valid,
    #form-message input:focus {
        border: 2px solid #000;
        border-radius: 8px;
    }

    #thanks-msg {

        flex-direction: column;
        text-align: center;
        margin: auto;

    }

    #thanks-msg h2 p {
        padding: 0;
        margin: 0;
        width: 100%;
    }

    /* ここまでフォーム */
</style>
