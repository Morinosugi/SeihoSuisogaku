<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木曽青峰高校吹奏楽部 スポンサー募集 2026</title>

    <link rel="icon" href="https://seihosuisogaku.morinosugi.com/favicon.svg" type="image/svg+xml">

    <link rel="shortcut icon" href="https://seihosuisogaku.morinosugi.com/favicon.ico">

    <!-- Adobe Fonts (DNP 秀英角ゴシック 銀) -->
    <script>
        (function (d) {
            var config = {
                kitId: 'ahd7ucz',
                scriptTimeout: 3000,
                async: true
            },
                h = d.documentElement, t = setTimeout(function () { h.className = h.className.replace(/\bwf-loading\b/g, "") + " wf-inactive"; }, config.scriptTimeout), tk = d.createElement("script"), f = false, s = d.getElementsByTagName("script")[0], a; h.className += " wf-loading"; tk.src = 'https://use.typekit.net/' + config.kitId + '.js'; tk.async = true; tk.onload = tk.onreadystatechange = function () { a = this.readyState; if (f || a && a != "complete" && a != "loaded") return; f = true; clearTimeout(t); try { Typekit.load(config) } catch (e) { } }; s.parentNode.insertBefore(tk, s)
        })(document);
    </script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        /* カラーパレットの設定 */
        :root {
            --color-sky: #00AEE3;
            --color-blush: #FFA69E;
            --color-berry: #AA4465;
            --color-raspberry: #861657;
            --color-blue: #304C89;

            --bg-color: #fafbfc;
            --text-main: #2c3e50;
            --text-light: #7f8c8d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* フォーム感をなくすため、スクロールバーを少し上品に */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-blush);
            border-radius: 4px;
        }

        body {
            /* ご指定のフォントを適用 */
            font-family: dnp-shuei-gothic-gin-std, sans-serif;
            font-weight: 400;
            font-style: normal;

            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* 画面全体に固定で敷くグラデーション背景 */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 10% 20%, rgba(0, 174, 227, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(255, 166, 158, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ----------------------------------
           ヒーローセクション（挨拶・タイトル）
        ----------------------------------- */
        .hero {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-top: 20px;
            margin-bottom: 10vh;
        }

        .school-info {
            font-size: 1.1rem;
            color: var(--color-blue);
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .school-info i {
            color: var(--color-sky);
        }

        .title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--color-raspberry);
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .intro-text {
            font-size: 1.1rem;
            color: var(--text-light);
            max-width: 600px;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--color-blush);
            font-size: 0.9rem;
            letter-spacing: 2px;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translate(-50%, 0);
            }

            50% {
                transform: translate(-50%, 10px);
            }
        }

        /* ----------------------------------
           各質問ステップ（フォーム感をなくす）
        ----------------------------------- */
        .form-step {
            min-height: 50vh;
            /* スクロールに合わせて1つずつ見せるための余白 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px 0;
            opacity: 0;
            /* GSAPで制御 */
        }

        .question-label {
            font-size: clamp(1.5rem, 3vw, 2rem);
            color: var(--color-blue);
            margin-bottom: 30px;
            font-weight: 700;
        }

        .req {
            color: var(--color-berry);
            font-size: 1rem;
            vertical-align: super;
            margin-left: 8px;
            font-weight: 400;
        }

        /* ----------------------------------
           入力フィールド（タイポグラフィ重視）
        ----------------------------------- */
        .input-wrap {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(48, 76, 137, 0.2);
            font-family: inherit;
            font-size: 1.5rem;
            color: var(--text-main);
            padding: 10px 0;
            transition: all 0.3s;
            resize: none;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-bottom-color: var(--color-sky);
        }

        input[type="text"]::placeholder,
        textarea::placeholder {
            color: #d1d8e0;
            font-size: 1.2rem;
            font-weight: 400;
        }

        /* ----------------------------------
           金額選択（ボタン風にカスタマイズ）
        ----------------------------------- */
        .amount-options {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .amount-option {
            position: relative;
            cursor: pointer;
        }

        .amount-option input[type="radio"] {
            display: none;
        }

        .amount-btn {
            display: inline-block;
            padding: 15px 40px;
            font-size: 1.3rem;
            color: var(--color-blue);
            border: 2px solid rgba(48, 76, 137, 0.2);
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            background: white;
        }

        .amount-option:hover .amount-btn {
            border-color: var(--color-sky);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 174, 227, 0.1);
        }

        .amount-option input[type="radio"]:checked+.amount-btn {
            background-color: var(--color-sky);
            color: white;
            border-color: var(--color-sky);
            box-shadow: 0 10px 20px rgba(0, 174, 227, 0.2);
        }

        /* ----------------------------------
           送信エリア
        ----------------------------------- */
        .submit-step {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-bottom: 100px;
        }

        .submit-text {
            font-size: 1.2rem;
            color: var(--text-light);
            margin-bottom: 40px;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--color-raspberry), var(--color-berry));
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.3rem;
            font-family: inherit;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(170, 68, 101, 0.3);
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .btn-submit:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(170, 68, 101, 0.4);
        }

        /* ----------------------------------
           サンクスメッセージ
        ----------------------------------- */
        .thanks-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            padding: 20px;
        }

        .thanks-screen.active {
            pointer-events: auto;
        }

        .thanks-screen h2 {
            font-size: clamp(2rem, 4vw, 3rem);
            color: var(--color-blue);
            margin: 20px 0;
        }

        .thanks-screen p {
            font-size: 1.2rem;
            color: var(--text-light);
        }

        /* レスポンシブ調整 */
        @media (max-width: 768px) {
            .form-step {
                min-height: 50vh;
                padding: 40px 0;
            }

            input[type="text"],
            textarea {
                font-size: 1.2rem;
            }

            .amount-btn {
                padding: 12px 30px;
                font-size: 1.1rem;
            }
        }

        #lure{
            margin-top: 5vh;
        }
    </style>
</head>

<body>

    <div class="bg-gradient"></div>

    <!-- Google Form用 隠しiframe -->
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"
        onload="if(submitted){showThanksScreen();}"></iframe>

    <form
        action="https://docs.google.com/forms/u/0/d/e/1FAIpQLScMBZtMKSeNMSEYhmR15ej80N__lLEMs3TDVx9CneAbF3AemA/formResponse"
        method="POST" target="hidden_iframe" id="sponsor-form">

        <div class="container">

            <!-- ヒーローセクション -->
            <section class="hero">
                <div class="school-info">
                    <span>長野県木曽青峰高等学校 吹奏楽部</span>
                </div>
                <h1 class="title">2026年度<br>スポンサー募集</h1>
                <div class="intro-text">
                    <p>私たちの活動は、皆様の温かいご支援に支えられています。<br>共に素晴らしい音楽を創り上げるパートナーとして、<br>ご協力を心よりお願い申し上げます。</p>
                </div>
                <div class="scroll-indicator">
                    SCROLL<br>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
            </section>

            <!-- 質問セクション -->
            <section class="form-step">
                <label class="question-label">会社名・店名<span class="req">必須</span></label>
                <div class="input-wrap">
                    <input type="text" name="entry.1011321067" placeholder="例：株式会社○○" required>
                </div>
            </section>

            <section class="form-step">
                <label class="question-label">ご担当者様名<span class="req">必須</span></label>
                <div class="input-wrap">
                    <input type="text" name="entry.692391162" placeholder="例：木曽 太郎" required>
                </div>
            </section>

            <section class="form-step">
                <label class="question-label">ご連絡先<span class="req">必須</span></label>
                <div class="input-wrap">
                    <input type="text" name="entry.2088388792" placeholder="電話番号 または メールアドレス" required>
                </div>
            </section>

            <section class="form-step">
                <label class="question-label">ご住所<span class="req">必須</span></label>
                <div class="input-wrap">
                    <input type="text" name="entry.298319453" placeholder="郵便番号・ご住所" required>
                </div>
            </section>

            <section class="form-step">
                <label class="question-label">ご支援金額<span class="req">必須</span></label>
                <div class="amount-options">
                    <label class="amount-option">
                        <input type="radio" name="entry.377160557" value="1000円" required>
                        <span class="amount-btn">1,000円</span>
                    </label>
                    <label class="amount-option">
                        <input type="radio" name="entry.377160557" value="5000円" required>
                        <span class="amount-btn">5,000円</span>
                    </label>
                    <label class="amount-option">
                        <input type="radio" name="entry.377160557" value="10000円" required>
                        <span class="amount-btn">10,000円</span>
                    </label>
                </div>
            </section>

            <section class="form-step">
                <label class="question-label">その他</label>
                <div class="input-wrap">
                    <textarea name="entry.526435235" rows="1" placeholder="ご自由にご記入ください"
                        oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                </div>
            </section>

            <!-- 送信ボタンセクション -->
            <section class="submit-step form-step">
                <p class="submit-text">ご入力ありがとうございました。<br>内容をご確認の上、送信ボタンを押してください。</p>
                <button type="submit" class="btn-submit" onclick="submitForm()">
                    送信する <i class="fa-solid fa-paper-plane" style="margin-left: 10px;"></i>
                </button>
                <p id="lure">このフォームはgoogle formsを介して通信され、個人情報は当目的以外に利用いたしません。</p>
            </section>

        </div>
    </form>

    <!-- 送信完了画面 -->
    <div class="thanks-screen" id="thanks-screen">
        <h2>ご入力ありがとうございます</h2>
        <p>担当者よりご連絡させていただきます。</p>
    </div>

    <script>
        // GSAPとScrollTriggerの初期化
        gsap.registerPlugin(ScrollTrigger);

        document.addEventListener("DOMContentLoaded", () => {
            // ヒーローセクションの初期アニメーション
            gsap.from(".hero > *", {
                y: 30,
                opacity: 0,
                duration: 1,
                stagger: 0.2,
                ease: "power3.out",
                delay: 0.5 // Webフォントの読み込みを少し待つ
            });

            // 各フォーム項目のスクロール連動アニメーション
            const steps = gsap.utils.toArray('.form-step');

            steps.forEach(step => {
                gsap.fromTo(step,
                    {
                        y: 80,
                        opacity: 0
                    },
                    {
                        scrollTrigger: {
                            trigger: step,
                            start: "top 85%", // 要素の上が画面の85%の位置に来たら開始
                            toggleActions: "play none none reverse" // スクロールして戻ると再度消える（LP風）
                        },
                        y: 0,
                        opacity: 1,
                        duration: 1,
                        ease: "power2.out"
                    }
                );
            });
        });

        // フォーム送信制御
        let submitted = false;

        function submitForm() {
            const form = document.getElementById('sponsor-form');
            if (form.checkValidity()) {
                submitted = true;
                // ボタンのクリックエフェクト
                gsap.to(".btn-submit", {
                    scale: 0.9,
                    duration: 0.1,
                    yoyo: true,
                    repeat: 1
                });
            }
        }

        // 完了画面のアニメーション表示
        function showThanksScreen() {
            if (submitted) {
                const thanksScreen = document.getElementById('thanks-screen');
                thanksScreen.classList.add('active');

                // 背景から要素がフワッと現れるアニメーション
                gsap.to(thanksScreen, {
                    opacity: 1,
                    duration: 0.8,
                    ease: "power2.inOut"
                });

                gsap.from("#thanks-screen > *", {
                    y: 30,
                    opacity: 0,
                    duration: 1,
                    stagger: 0.2,
                    ease: "back.out(1.5)",
                    delay: 0.3
                });

                // 元のフォームのスクロール位置をリセット
                window.scrollTo(0, 0);
            }
        }
    </script>
</body>

</html>
