<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木曽青峰高校吹奏楽部 スポンサー募集 2026</title>

    <link rel="icon" href="https://seihosuisogaku.morinosugi.com/favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="https://seihosuisogaku.morinosugi.com/favicon.ico">

    <!-- Adobe Fonts (DNP 秀英角ゴシック 銀) -->
    <script>
        (function (d) {
            var config = {
                kitId: 'ahd7ucz',
                scriptTimeout: 3000,
                async: true
            },
                h = d.documentElement, t = setTimeout(function () { h.className = h.className.replace(/\bwf-loading\b/g, "") + " wf-inactive"; }, config.scriptTimeout), tk = d.createElement("script"), f = false, s = d.getElementsByTagName("script")[0], a; h.className += " wf-loading"; tk.src = 'https://use.typekit.net/' + config.kitId + '.js'; tk.async = true; tk.onload = tk.onreadystatechange = function () { a = this.readyState; if (f || a && a != "complete" && a != "loaded") return; f = true; clearTimeout(t); try { Typekit.load(config) } catch (e) { } }; s.parentNode.insertBefore(tk, s)
        })(document);
    </script>

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- GSAP & ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        /* カラーパレットの設定 */
        :root {
            --color-sky: #00AEE3;
            --color-blush: #FFA69E;
            --color-berry: #AA4465;
            --color-raspberry: #861657;
            --color-blue: #304C89;

            --bg-color: #fafbfc;
            --text-main: #2c3e50;
            --text-light: #7f8c8d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-blush);
            border-radius: 4px;
        }

        body {
            font-family: dnp-shuei-gothic-gin-std, sans-serif;
            font-weight: 400;
            font-style: normal;

            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.8;
            overflow-x: hidden;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 10% 20%, rgba(0, 174, 227, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(255, 166, 158, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ----------------------------------
           ヒーローセクション
        ----------------------------------- */
        .hero {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-top: 20px;
            margin-bottom: 10vh;
        }

        .school-info {
            font-size: 1.1rem;
            color: var(--color-blue);
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--color-raspberry);
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .intro-text {
            font-size: 1.1rem;
            color: var(--text-light);
            max-width: 600px;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--color-blush);
            font-size: 0.9rem;
            letter-spacing: 2px;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, 10px); }
        }

        /* ----------------------------------
           各質問ステップ
        ----------------------------------- */
        .form-step {
            min-height: 0vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px 0;
            opacity: 0; /* GSAPで制御 */
        }

        .question-label {
            font-size: clamp(1.5rem, 3vw, 2rem);
            color: var(--color-blue);
            margin-bottom: 30px;
            font-weight: 700;
        }

        .req {
            color: var(--color-berry);
            font-size: 1rem;
            vertical-align: super;
            margin-left: 8px;
            font-weight: 400;
        }

        .input-wrap {
            position: relative;
            width: 100%;
            max-width: 600px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(48, 76, 137, 0.2);
            font-family: inherit;
            font-size: 1.5rem;
            color: var(--text-main);
            padding: 10px 0;
            transition: all 0.3s;
            resize: none;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-bottom-color: var(--color-sky);
        }

        input[type="text"]::placeholder,
        textarea::placeholder {
            color: #d1d8e0;
            font-size: 1.2rem;
            font-weight: 400;
        }

        /* ----------------------------------
           ラジオボタン（種類・金額共通）
        ----------------------------------- */
        .amount-options {
            display: flex;
            flex-wrap: wrap;
            gap: 2vw;
        }

        .amount-option {
            position: relative;
            cursor: pointer;
        }

        .amount-option input[type="radio"] {
            display: none;
        }

        .amount-btn {
            display: inline-block;
            padding: 15px 20px;
            margin: auto;
            font-size: 1.3rem;
            color: var(--color-blue);
            border: 2px solid rgba(48, 76, 137, 0.2);
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            background: white;
            min-width: 120px;
            text-align: center;
        }

        .amount-option:hover .amount-btn {
            border-color: var(--color-sky);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 174, 227, 0.1);
        }

        .amount-option input[type="radio"]:checked+.amount-btn {
            background-color: var(--color-sky);
            color: white;
            border-color: var(--color-sky);
            box-shadow: 0 10px 20px rgba(0, 174, 227, 0.2);
        }

        /* ----------------------------------
           送信エリア
        ----------------------------------- */
        .submit-step {
            min-height: 80vh;
            display: flex; /* 初期表示はJSで切り替え */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-bottom: 100px;
        }

        .submit-text {
            font-size: 1.2rem;
            color: var(--text-light);
            margin-bottom: 40px;
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--color-raspberry), var(--color-berry));
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.3rem;
            font-family: inherit;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(170, 68, 101, 0.3);
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .btn-submit:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(170, 68, 101, 0.4);
        }

        #lure {
            margin-top: 5vh;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        /* ----------------------------------
           サンクスメッセージ
        ----------------------------------- */
        .thanks-screen {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            padding: 20px;
        }

        .thanks-screen.active {
            pointer-events: auto;
        }

        .thanks-screen h2 {
            font-size: clamp(2rem, 4vw, 3rem);
            color: var(--color-blue);
            margin: 20px 0;
        }

        .thanks-screen p {
            font-size: 1.2rem;
            color: var(--text-light);
        }

        /* レスポンシブ調整 */
        @media (max-width: 768px) {
            .form-step {
                min-height: 50vh;
                padding: 40px 0;
            }
            input[type="text"], textarea {
                font-size: 1.2rem;
            }
            .amount-btn {
                padding: 11px 20px;
                font-size: 1.1rem;
                min-width: 100px;
            }
        }
    </style>
</head>

<body>

    <div class="bg-gradient"></div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){showThanksScreen();}"></iframe>

    <form action="https://docs.google.com/forms/u/0/d/e/1FAIpQLScMBZtMKSeNMSEYhmR15ej80N__lLEMs3TDVx9CneAbF3AemA/formResponse" method="POST" target="hidden_iframe" id="sponsor-form">

        <!-- Google Form システム用 Hidden Input -->
        <input type="hidden" name="fvv" value="1">
        <input type="hidden" name="partialResponse" value="[null,null,&quot;-4289172103768133142&quot;]">
        <input type="hidden" name="pageHistory" value="0">
        <input type="hidden" name="fbzx" value="-4289172103768133142">

        <div class="container">

            <!-- ヒーローセクション -->
            <section class="hero">
                <div class="school-info">
                    <span>長野県木曽青峰高等学校 吹奏楽部</span>
                </div>
                <h1 class="title">2026年度<br>スポンサー募集</h1>
                <div class="intro-text">
                    <p>私たちの活動は、皆様の温かいご支援に支えられています。<br>共に素晴らしい音楽を創り上げるパートナーとして、<br>ご協力を心よりお願い申し上げます。</p>
                </div>
                <div class="scroll-indicator">
                    SCROLL<br>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
            </section>

            <!-- 種類選択（最初に見える質問） -->
            <section class="form-step">
                <label class="question-label">ご支援の種類<span class="req">必須</span></label>
                <div class="amount-options">
                    <label class="amount-option">
                        <input type="radio" name="entry.236920580" value="会社" required onchange="toggleFormType('company')">
                        <span class="amount-btn">会社</span>
                    </label>
                    <label class="amount-option">
                        <input type="radio" name="entry.236920580" value="個人" required onchange="toggleFormType('individual')">
                        <span class="amount-btn">個人</span>
                    </label>
                </div>
            </section>

            <!-- ▼▼ 会社用セクション (初期は非表示) ▼▼ -->
            <div id="form-company" style="display: none;">
                <section class="form-step">
                    <label class="question-label">会社名・店名<span class="req">必須</span></label>
                    <div class="input-wrap">
                        <!-- JSで有効化する際、data-required="true"を持つ要素にrequiredを付与します -->
                        <input type="text" name="entry.1011321067" placeholder="例：株式会社○○" data-required="true" disabled>
                    </div>
                </section>

                <section class="form-step">
                    <label class="question-label">担当者名<span class="req">必須</span></label>
                    <div class="input-wrap">
                        <input type="text" name="entry.692391162" placeholder="例：木曽 太郎" data-required="true" disabled>
                    </div>
                </section>

                <section class="form-step">
                    <label class="question-label">ご連絡先<span class="req">必須</span></label>
                    <div class="input-wrap">
                        <input type="text" name="entry.2088388792" placeholder="電話番号 または メールアドレス" data-required="true" disabled>
                    </div>
                </section>

                <section class="form-step">
                    <label class="question-label">ご住所<span class="req">必須</span></label>
                    <div class="input-wrap">
                        <input type="text" name="entry.298319453" placeholder="郵便番号・ご住所" data-required="true" disabled>
                    </div>
                </section>

                <section class="form-step">
                    <label class="question-label">ご予定の支援金額<span class="req">必須</span></label>
                    <div class="amount-options">
                        <label class="amount-option">
                            <input type="radio" name="entry.377160557" value="3000円" data-required="true" disabled>
                            <span class="amount-btn">3,000円</span>
                        </label>
                        <label class="amount-option">
                            <input type="radio" name="entry.377160557" value="5000円" data-required="true" disabled>
                            <span class="amount-btn">5,000円</span>
                        </label>
                        <label class="amount-option">
                            <input type="radio" name="entry.377160557" value="10000円" data-required="true" disabled>
                            <span class="amount-btn">10,000円</span>
                        </label>
                        <label class="amount-option">
                            <input type="radio" name="entry.377160557" value="20000円" data-required="true" disabled>
                            <span class="amount-btn">20,000円</span>
                        </label>
                    </div>
                </section>

                <section class="form-step">
                    <label class="question-label">その他</label>
                    <div class="input-wrap">
                        <!-- 任意項目なのでdata-requiredはつけない -->
                        <textarea name="entry.526435235" rows="1" placeholder="ご自由にご記入ください" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'" disabled></textarea>
                    </div>
                </section>
            </div>
            <!-- ▲▲ 会社用セクション ここまで ▲▲ -->

            <!-- ▼▼ 個人用セクション (初期は非表示) ▼▼ -->
            <div id="form-individual" style="display: none;">
                <!-- 個人の項目は画像通り必須マークをつけていません（data-requiredも無し） -->
                <section class="form-step">
                    <label class="question-label">お名前</label>
                    <div class="input-wrap">
                        <input type="text" name="entry.1768670706" placeholder="例：木曽 太郎" disabled>
                    </div>
                </section>

                <section class="form-step">
                    <label class="question-label">ご住所</label>
                    <div class="input-wrap">
                        <input type="text" name="entry.897975770" placeholder="郵便番号・ご住所" disabled>
                    </div>
                </section>

                <section class="form-step">
                    <label class="question-label">ご連絡先</label>
                    <div class="input-wrap">
                        <input type="text" name="entry.1682954233" placeholder="電話番号 または メールアドレス" disabled>
                    </div>
                </section>
            </div>
            <!-- ▲▲ 個人用セクション ここまで ▲▲ -->

            <!-- 送信ボタンセクション (初期は非表示) -->
            <section class="submit-step form-step" id="submit-section" style="display: none;">
                <p class="submit-text">ご入力ありがとうございました。<br>内容をご確認の上、送信ボタンを押してください。</p>
                <button type="submit" class="btn-submit" onclick="submitForm()">
                    送信する <i class="fa-solid fa-paper-plane" style="margin-left: 10px;"></i>
                </button>
                <p id="lure">このフォームはGoogle Formsを介して通信され、個人情報は当目的以外に利用いたしません。</p>
            </section>

        </div>
    </form>

    <!-- 送信完了画面 -->
    <div class="thanks-screen" id="thanks-screen">
        <i class="fa-solid fa-gift" style="font-size: 5rem; color: var(--color-sky);"></i>
        <h2>ご入力ありがとうございます</h2>
        <p>担当者よりご連絡させていただきます。</p>
    </div>

    <script>
        // GSAPとScrollTriggerの初期化
        gsap.registerPlugin(ScrollTrigger);

        document.addEventListener("DOMContentLoaded", () => {
            gsap.from(".hero > *", {
                y: 30, opacity: 0, duration: 1, stagger: 0.2, ease: "power3.out", delay: 0.5
            });
            initScrollTriggers();
        });

        // フォーム項目のスクロールアニメーション設定関数
        function initScrollTriggers() {
            const steps = gsap.utils.toArray('.form-step');
            steps.forEach(step => {
                // すでにトリガー設定済みの場合はスキップ
                if(step.classList.contains('scroll-triggered')) return;
                step.classList.add('scroll-triggered');

                gsap.fromTo(step,
                    { y: 80, opacity: 0 },
                    {
                        scrollTrigger: {
                            trigger: step,
                            start: "top 85%",
                            toggleActions: "play none none reverse"
                        },
                        y: 0, opacity: 1, duration: 1, ease: "power2.out"
                    }
                );
            });
        }

        // 種類（会社・個人）を選択した際の切り替えロジック
        function toggleFormType(type) {
            const formCompany = document.getElementById('form-company');
            const formIndividual = document.getElementById('form-individual');
            const submitSection = document.getElementById('submit-section');

            // 一旦すべての入力を無効化（エラー防止＆送信データから除外）
            setInputsState(formCompany, true);
            setInputsState(formIndividual, true);

            // 選択された方だけ表示＆有効化
            if (type === 'company') {
                formCompany.style.display = 'block';
                formIndividual.style.display = 'none';
                setInputsState(formCompany, false);
            } else if (type === 'individual') {
                formCompany.style.display = 'none';
                formIndividual.style.display = 'block';
                setInputsState(formIndividual, false);
            }

            submitSection.style.display = 'flex';

            // DOMが変わったので、少し待ってからScrollTriggerを再計算しアニメーションを適用
            setTimeout(() => {
                initScrollTriggers();
                ScrollTrigger.refresh();
                // 選択後にスムーズに下へ促す
                window.scrollBy({ top: 150, behavior: 'smooth' });
            }, 50);
        }

        // 入力項目の disabled と required を切り替える関数
        function setInputsState(container, isDisabled) {
            const inputs = container.querySelectorAll('input, textarea');
            inputs.forEach(input => {
                input.disabled = isDisabled;
                // data-required="true" が付いている項目だけ、表示時は required をONにする
                if (input.dataset.required === 'true') {
                    input.required = !isDisabled;
                }
            });
        }

        // フォーム送信制御
        let submitted = false;
        function submitForm() {
            const form = document.getElementById('sponsor-form');
            if (form.checkValidity()) {
                submitted = true;
                gsap.to(".btn-submit", { scale: 0.9, duration: 0.1, yoyo: true, repeat: 1 });
            }
        }

        // 完了画面の表示
        function showThanksScreen() {
            if (submitted) {
                const thanksScreen = document.getElementById('thanks-screen');
                thanksScreen.classList.add('active');
                gsap.to(thanksScreen, { opacity: 1, duration: 0.8, ease: "power2.inOut" });
                gsap.from("#thanks-screen > *", { y: 30, opacity: 0, duration: 1, stagger: 0.2, ease: "back.out(1.5)", delay: 0.3 });
                window.scrollTo(0, 0);
            }
        }
    </script>
</body>
</html>
